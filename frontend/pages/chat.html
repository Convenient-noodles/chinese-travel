<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅伴 - AI 旅游问答</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/chat.css">
    <link rel="stylesheet" href="../css/map.css">
    <!-- 高德地图 JS API -->
    <script src="https://webapi.amap.com/maps?v=2.0&key=84673d0933037fe8f09bb6592ddc7ddb&plugin=AMap.ToolBar,AMap.Scale,AMap.MarkerCluster,AMap.Driving,AMap.Walking,AMap.Transfer,AMap.PlaceSearch"></script>
    <!-- marked.js 用于 Markdown 渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="chat-app">
        <!-- 顶部导航 -->
        <header class="chat-header">
            <div class="header-left">
                <a href="/pages/admin-knowledge.html" id="adminLink" class="btn-back hidden" title="知识库管理">⚙️ 管理</a>
                <span class="header-logo">🏔️</span>
                <span class="header-title">旅伴</span>
                <span class="header-divider">|</span>
                <span id="conversationTitle" class="header-subtitle">旅游咨询</span>
            </div>
            <div class="header-right">
                <button id="locateBtn" class="btn-secondary btn-sm" title="获取当前位置">📍 定位</button>
                <span id="userLocation" style="font-size:12px;color:var(--color-text-secondary);"></span>
                <button id="newChatBtn" class="btn-secondary btn-sm" title="新建会话">＋ 新会话</button>
                <div class="user-menu">
                    <span id="headerUsername" class="header-username"></span>
                    <button id="logoutBtn" class="btn-secondary btn-sm">退出</button>
                </div>
            </div>
        </header>

        <div class="chat-body">
            <!-- 左侧会话列表 -->
            <aside class="chat-sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h3>💬 对话记录</h3>
                </div>
                <div class="sidebar-list" id="conversationList">
                    <div class="sidebar-loading">加载中...</div>
                </div>
            </aside>

            <!-- 主聊天区域 -->
            <main class="chat-main">
                <!-- 消息列表 -->
                <div class="chat-messages" id="chatMessages">
                    <div class="welcome-message">
                        <div class="welcome-icon">🏔️</div>
                        <h2>欢迎使用旅伴</h2>
                        <p>我是您的中国旅游推荐助手，可以为您：</p>
                        <div class="welcome-features">
                            <div class="welcome-card" onclick="sendQuickQuestion('推荐北京的热门景点')">
                                <span>🗺️</span>
                                <strong>景点推荐</strong>
                                <small>发现国内最美目的地</small>
                            </div>
                            <div class="welcome-card" onclick="sendQuickQuestion('杭州西湖附近有什么好的酒店推荐？')">
                                <span>🏨</span>
                                <strong>住宿推荐</strong>
                                <small>找到舒适的落脚之处</small>
                            </div>
                            <div class="welcome-card" onclick="sendQuickQuestion('成都必吃的特色美食有哪些？')">
                                <span>🍜</span>
                                <strong>美食推荐</strong>
                                <small>品尝地道中国味道</small>
                            </div>
                            <div class="welcome-card" onclick="sendQuickQuestion('帮我规划一个3天的西安旅游行程')">
                                <span>📋</span>
                                <strong>行程规划</strong>
                                <small>一键生成旅行计划</small>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 地图面板 -->
                <div class="map-panel" id="mapPanel">
                    <div class="map-header">
                        <span>📍 旅行地图</span>
                        <button id="toggleMapBtn" class="btn-icon" title="收起地图">▼</button>
                    </div>
                    <div id="mapContainer" class="map-container"></div>
                </div>

                <!-- 输入区域 -->
                <div class="chat-input-area">
                    <div class="chat-input-wrapper">
                        <textarea
                            id="chatInput"
                            placeholder="输入您想了解的旅游问题，例如：推荐杭州的景点..."
                            rows="1"
                            maxlength="2000"
                        ></textarea>
                        <button id="sendBtn" class="btn-primary" title="发送">
                            <span>发送</span>
                        </button>
                    </div>
                    <div class="input-hint">
                        <span>按 Enter 发送，Shift+Enter 换行</span>
                        <span id="charCount">0/2000</span>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- 引用弹窗 -->
    <div id="citationModal" class="modal hidden">
        <div class="modal-overlay" onclick="closeCitationModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>📖 知识库原文引用</h3>
                <button class="btn-icon" onclick="closeCitationModal()">✕</button>
            </div>
            <div id="citationContent" class="modal-body"></div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/markdown.js"></script>
    <script src="../js/map.js"></script>
    <script src="../js/chat.js"></script>
    <script>
        // 定位功能（内嵌，确保一定工作）
        document.addEventListener('DOMContentLoaded', function() {
            var btn = document.getElementById('locateBtn');
            if (!btn) return;
            btn.onclick = function() {
                btn.textContent = '⏳';
                btn.disabled = true;
                if (!navigator.geolocation) {
                    Utils.showToast('浏览器不支持定位', 'error');
                    btn.textContent = '📍 定位'; btn.disabled = false;
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    function(pos) {
                        var lat = pos.coords.latitude;
                        var lng = pos.coords.longitude;
                        var city = '未知城市';
                        fetch('https://restapi.amap.com/v3/geocode/regeo?key=' + CONFIG.AMAP_KEY +
                            '&location=' + lng + ',' + lat + '&output=json')
                        .then(function(r) { return r.json(); })
                        .then(function(data) {
                            if (data.status === '1' && data.regeocode) {
                                var a = data.regeocode.addressComponent;
                                city = a.city || a.province || a.district || '未知';
                            }
                            finish();
                        }).catch(function() { finish(); });
                        function finish() {
                            ChatState.userLocation = { lat: lat, lng: lng, city: city };
                            document.getElementById('userLocation').textContent = '📍 ' + city;
                            btn.textContent = '📍 已定位'; btn.disabled = false;
                            MapView.setUserLocation(lng, lat);
                            // 展开地图面板
                            var panel = document.getElementById('mapPanel');
                            if (panel) panel.classList.remove('collapsed');
                            // 直接在地图上标记
                            setTimeout(function() {
                                if (!MapView.map) {
                                    var c = document.getElementById('mapContainer');
                                    if (c) {
                                        MapView.map = new AMap.Map(c, {
                                            zoom: 13, center: [lng, lat],
                                            viewMode: '2D', resizeEnable: true
                                        });
                                    }
                                }
                                if (MapView.map) {
                                    MapView.map.setCenter([lng, lat]);
                                    MapView.map.setZoom(13);
                                    var marker = new AMap.Marker({
                                        position: [lng, lat],
                                        title: '我的位置',
                                        label: { content: '📍 我的位置', direction: 'top' }
                                    });
                                    marker.setMap(MapView.map);
                                    // 把旧标记也清掉
                                    MapView.map.clearMap();
                                    marker.setMap(MapView.map);
                                    MapView.markers.push(marker);
                                }
                            }, 500);
                            Utils.showToast('已定位到: ' + city);
                        }
                    },
                    function(err) {
                        Utils.showToast('定位失败: ' + (err.message || '请允许定位'), 'error');
                        btn.textContent = '📍 定位'; btn.disabled = false;
                    },
                    { timeout: 10000, enableHighAccuracy: true }
                );
            };
        });
    </script>
</body>
</html>
