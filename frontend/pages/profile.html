<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅伴 - 个人中心</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/auth.css">
    <style>
        .profile-container { max-width: 500px; margin: 60px auto; padding: 30px; background: var(--color-surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); }
        .profile-container h2 { margin-bottom: 24px; }
        .profile-info { margin-bottom: 32px; padding: 16px; background: var(--color-bg); border-radius: var(--radius-sm); }
        .profile-info p { margin: 8px 0; font-size: 14px; }
        .back-link { display: block; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="profile-container">
        <h2>👤 个人中心</h2>
        <div class="profile-info" id="profileInfo"></div>

        <h3 style="margin-bottom:16px;">🔒 修改密码</h3>
        <div class="form-group">
            <label>旧密码</label>
            <input type="password" id="oldPassword" placeholder="请输入旧密码">
        </div>
        <div class="form-group">
            <label>新密码（至少6位）</label>
            <input type="password" id="newPassword" placeholder="请输入新密码">
        </div>
        <div class="form-group">
            <label>确认新密码</label>
            <input type="password" id="confirmPassword" placeholder="请再次输入新密码">
        </div>
        <div id="pwdError" class="error-message"></div>
        <button id="changePwdBtn" class="btn-primary" style="width:100%;">修改密码</button>

        <a href="/pages/chat.html" class="back-link">← 返回问答</a>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script>
        // 加载用户信息
        (async function() {
            const user = API.getUser();
            if (!user) { window.location.href = '/'; return; }
            document.getElementById('profileInfo').innerHTML = `
                <p><strong>用户名：</strong>${user.username}</p>
                <p><strong>昵称：</strong>${user.nickname || '-'}</p>
                <p><strong>角色：</strong>${user.role === 'admin' ? '管理员' : '普通用户'}</p>
            `;
        })();

        document.getElementById('changePwdBtn').addEventListener('click', async () => {
            const oldPwd = document.getElementById('oldPassword').value;
            const newPwd = document.getElementById('newPassword').value;
            const confirmPwd = document.getElementById('confirmPassword').value;
            const errorEl = document.getElementById('pwdError');
            errorEl.textContent = '';

            if (!oldPwd || !newPwd || !confirmPwd) { errorEl.textContent = '请填写所有字段'; return; }
            if (newPwd.length < 6) { errorEl.textContent = '新密码至少6位'; return; }
            if (newPwd !== confirmPwd) { errorEl.textContent = '两次输入的新密码不一致'; return; }

            const btn = document.getElementById('changePwdBtn');
            btn.disabled = true; btn.textContent = '修改中...';
            try {
                await API.auth.changePassword({ old_password: oldPwd, new_password: newPwd });
                Utils.showToast('密码修改成功，请重新登录');
                API.clearTokens();
                setTimeout(() => window.location.href = '/', 1500);
            } catch (e) {
                errorEl.textContent = e.message;
            } finally {
                btn.disabled = false; btn.textContent = '修改密码';
            }
        });
    </script>
</body>
</html>
